openapi: 3.0.3
info:
  title: HolySpots API v2026
  description: |
    Modern REST API for admin panels and website.

    Sections:
    - `/admin` - Full CRUD for admin panels (requires authentication)
    - `/public` - Read-only endpoints for website
    - `/user` - User profile and favorites (requires authentication)

    All responses follow the format:
    ```json
    {
      "success": true,
      "data": {...},
      "pagination": { "page": 1, "limit": 20, "total": 100 }
    }
    ```
  version: "2026"

servers:
  - url: /api/v2026
    description: v2026 API

tags:
  - name: Admin - Cities
    description: City management
  - name: Admin - Spots
    description: Spot management
  - name: Admin - Routes
    description: Route/Guide management
  - name: Admin - Events
    description: Event management
  - name: Admin - Files
    description: File upload management
  - name: Public - Cities
    description: Public city endpoints
  - name: Public - Spots
    description: Public spot endpoints
  - name: Public - Routes
    description: Public route endpoints
  - name: Public - Events
    description: Public event endpoints
  - name: Public - Search
    description: Search endpoints
  - name: User - Profile
    description: User profile management
  - name: User - Favorites
    description: User favorites management

paths:
  # Admin - Cities
  /admin/cities:
    get:
      tags: [Admin - Cities]
      summary: List all cities
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderDir'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
    post:
      tags: [Admin - Cities]
      summary: Create a city
      requestBody:
        $ref: '#/components/requestBodies/CityBody'
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'

  /admin/cities/{id}:
    get:
      tags: [Admin - Cities]
      summary: Get a city
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    put:
      tags: [Admin - Cities]
      summary: Update a city
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/CityBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [Admin - Cities]
      summary: Delete a city (soft delete)
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  # Admin - Spots
  /admin/spots:
    get:
      tags: [Admin - Spots]
      summary: List all spots
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/CityIdFilter'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
    post:
      tags: [Admin - Spots]
      summary: Create a spot
      requestBody:
        $ref: '#/components/requestBodies/SpotBody'
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'

  /admin/spots/{id}:
    get:
      tags: [Admin - Spots]
      summary: Get a spot with photos and audios
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    put:
      tags: [Admin - Spots]
      summary: Update a spot
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        $ref: '#/components/requestBodies/SpotBody'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    delete:
      tags: [Admin - Spots]
      summary: Delete a spot
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  # Admin - Files
  /admin/files/upload:
    post:
      tags: [Admin - Files]
      summary: Upload a file
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                  default: uploads
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                      path:
                        type: string
                      filename:
                        type: string
                      mimetype:
                        type: string
                      size:
                        type: integer

  # Public - Cities
  /public/cities:
    get:
      tags: [Public - Cities]
      summary: List all active cities
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /public/cities/{id}:
    get:
      tags: [Public - Cities]
      summary: Get city details
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  # Public - Spots
  /public/spots:
    get:
      tags: [Public - Spots]
      summary: List spots for a city
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
        - name: city_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'

  /public/spots/{id}:
    get:
      tags: [Public - Spots]
      summary: Get spot details with photos and audios
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /public/spots/{id}/reviews:
    get:
      tags: [Public - Spots]
      summary: Get reviews for a spot
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'

  # Public - Search
  /public/search:
    get:
      tags: [Public - Search]
      summary: Search across all content
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: city_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [spots, routes, events]
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  # User - Profile
  /user/profile:
    get:
      tags: [User - Profile]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
    put:
      tags: [User - Profile]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                avatar:
                  type: string
                language:
                  type: string
                  enum: [en, ru, hi]
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  # User - Favorites
  /user/favorites:
    get:
      tags: [User - Favorites]
      summary: Get user favorites
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          $ref: '#/components/responses/PaginatedResponse'
    post:
      tags: [User - Favorites]
      summary: Add spot to favorites
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [spot_id]
              properties:
                spot_id:
                  type: string
                  format: uuid
      responses:
        '201':
          $ref: '#/components/responses/SuccessResponse'

  /user/favorites/{spotId}:
    delete:
      tags: [User - Favorites]
      summary: Remove spot from favorites
      security:
        - bearerAuth: []
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

  /user/favorites/check/{spotId}:
    get:
      tags: [User - Favorites]
      summary: Check if spot is favorited
      security:
        - bearerAuth: []
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 1

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100

    OrderBy:
      name: order_by
      in: query
      schema:
        type: string

    OrderDir:
      name: order_dir
      in: query
      schema:
        type: string
        enum: [asc, desc]
        default: asc

    CityIdFilter:
      name: city_id
      in: query
      schema:
        type: string
        format: uuid

    AcceptLanguage:
      name: Accept-Language
      in: header
      description: Language code
      schema:
        type: string
        default: en
        enum: [en, ru, hi]

  requestBodies:
    CityBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                $ref: '#/components/schemas/LocalizedText'
              descr:
                $ref: '#/components/schemas/LocalizedText'
              main_photo:
                type: string
              order:
                type: integer
              is_deleted:
                type: boolean

    SpotBody:
      content:
        application/json:
          schema:
            type: object
            required: [city_id]
            properties:
              city_id:
                type: string
                format: uuid
              name:
                $ref: '#/components/schemas/LocalizedText'
              descr:
                $ref: '#/components/schemas/LocalizedText'
              main_photo:
                type: string
              location:
                $ref: '#/components/schemas/GeoPoint'
              address:
                type: string
              order:
                type: integer
              photos:
                type: array
                items:
                  type: string
              audios:
                type: array
                items:
                  type: object
                  properties:
                    file:
                      type: string
                    lang:
                      type: string

  schemas:
    LocalizedText:
      type: object
      properties:
        en:
          type: string
        ru:
          type: string
        hi:
          type: string

    GeoPoint:
      type: object
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          items:
            type: number
          minItems: 2
          maxItems: 2

  responses:
    SuccessResponse:
      description: Success response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: object

    PaginatedResponse:
      description: Paginated response
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
              data:
                type: array
                items:
                  type: object
              pagination:
                type: object
                properties:
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
