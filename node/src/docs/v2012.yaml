openapi: 3.0.3
info:
  title: Bhagavad-Gita API v2012
  description: |
    API for Bhagavad-Gita mobile applications (bhagavadgita-mobile-java-v2012, bhagavadgita-mobile-swift-v2012).

    All endpoints use POST method.

    All responses follow the format:
    ```json
    {
      "code": 0,
      "msg": "",
      "data": [...]
    }
    ```

    Response codes:
    - 0: Success
    - 1: Error
  version: "2012"

servers:
  - url: /api
    description: v2012 API

tags:
  - name: Languages
    description: Available languages
  - name: Books
    description: Book translations
  - name: Chapters
    description: Chapters with slokas
  - name: Quotes
    description: Daily quotes

paths:
  /Data/Languages:
    post:
      tags: [Languages]
      summary: Get all languages
      description: Returns all available languages for translations
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: List of languages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V2012Response'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Language'

  /Data/Books:
    post:
      tags: [Books]
      summary: Get books
      description: Returns all books or filtered by IDs
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  description: Optional array of book IDs to filter
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V2012Response'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Book'

  /Data/Chapters:
    post:
      tags: [Chapters]
      summary: Get chapters for a book
      description: Returns chapters with nested slokas and vocabularies
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookId]
              properties:
                bookId:
                  type: integer
                  description: ID of the book
      responses:
        '200':
          description: List of chapters with slokas
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/V2012Response'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Chapter'

  /Data/Quotes:
    post:
      tags: [Quotes]
      summary: Get random quote
      description: Returns a random quote (filtered by Accept-Language if possible)
      parameters:
        - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Random quote (single object, not array)
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    enum: [0, 1]
                  msg:
                    type: string
                  data:
                    $ref: '#/components/schemas/Quote'

components:
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      description: Language code (en, ru, de, spa)
      schema:
        type: string
        default: en
        enum: [en, ru, de, spa]

  schemas:
    V2012Response:
      type: object
      properties:
        code:
          type: integer
          enum: [0, 1]
          description: "0 = Success, 1 = Error"
        msg:
          type: string
          description: Error message (empty on success)
        data:
          type: array
          items:
            type: object

    Language:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "English"
        code:
          type: string
          example: "en"

    Book:
      type: object
      properties:
        id:
          type: integer
          example: 1
        languageId:
          type: integer
          example: 2
        name:
          type: string
          example: "Bhagavad-gita As It Is"
        initials:
          type: string
          example: "SP"
        chaptersCount:
          type: integer
          example: 18

    Chapter:
      type: object
      properties:
        name:
          type: string
          example: "Observing the Armies"
        order:
          type: integer
          example: 1
        slokas:
          type: array
          items:
            $ref: '#/components/schemas/Sloka'

    Sloka:
      type: object
      properties:
        name:
          type: string
          example: "1.1"
        text:
          type: string
          description: Sanskrit text
        transcription:
          type: string
          description: Transliteration
        translation:
          type: string
          description: Translation in target language
        comment:
          type: string
          description: Commentary
        order:
          type: integer
          example: 1
        audio:
          type: string
          description: Audio file path (translation)
          example: "/Files/abc123.mp3"
        audioSanskrit:
          type: string
          description: Audio file path (Sanskrit)
        vocabularies:
          type: array
          items:
            $ref: '#/components/schemas/Vocabulary'

    Vocabulary:
      type: object
      properties:
        text:
          type: string
          description: Sanskrit word
          example: "dharma"
        translation:
          type: string
          description: Word meaning
          example: "religion, duty"

    Quote:
      type: object
      properties:
        author:
          type: string
          example: "A.C. Bhaktivedanta Swami Prabhupada"
        text:
          type: string
          example: "The purpose of Bhagavad-gita is to deliver mankind..."
